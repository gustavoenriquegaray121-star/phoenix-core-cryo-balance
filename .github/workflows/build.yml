name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Fix icon names
        run: |
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher_1.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher_1.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher_1.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher_1.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher_2.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher_2.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher_3.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher_3.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_4.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_4.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png 2>/dev/null || true
          echo "Icons ready"

      - name: Download videos
        run: |
          pip install gdown -q
          mkdir -p assets/videos
          gdown 1Sk--RSGdVOnyTYxYYPpWBaaHn_YA5w5F -O assets/videos/intro_dock.mp4 || true
          gdown 1_X3PtgAelk-BGPSQXSSsXQn8B6aiKfve -O assets/videos/batalla_regreso.mp4 || true
          gdown 1wdwT1BUt73Ii9BRAfgwmmGfxbTdxxvyw -O assets/videos/primera_mision.mp4 || true
          gdown 1So57nA9zj9939Wm3Ersd6EHElXIXwYqP -O assets/videos/segunda_mision.mp4 || true
          gdown 1ZUyvU44swFDlMHSjPkjlcWjhQDCvGcjD -O assets/videos/tercera_mision.mp4 || true
          gdown 174rrFFbx6GSfKwsz1s0QbvQYtxqwKRSB -O assets/videos/cuarta_mision.mp4 || true
          gdown 1RYm3ZfUz7OPRrPsf7q-qLfrFdClz6ma- -O assets/videos/final_nave.mp4 || true
          gdown 1HEYd1MzZJiqbFMprAWWLuABEb4CoXiRM -O assets/videos/final_final.mp4 || true
          ls -lh assets/videos/

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: phoenix-core-release
          path: build/app/outputs/flutter-apk/app-release.apk
