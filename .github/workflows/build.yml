name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # ══════════════════════════════════════════════════════
      # DESCARGA DE VIDEOS DESDE GOOGLE DRIVE
      # Orden narrativo: intro → batalla_regreso → misiones → final
      # ══════════════════════════════════════════════════════
      - name: Create videos directory
        run: mkdir -p assets/videos

      - name: Download intro_dock.mp4
        run: |
          FILE_ID="1Sk--RSGdVOnyTYxYYPpWBaaHn_YA5w5F"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/intro_dock.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/intro_dock.mp4

      - name: Download batalla_regreso.mp4
        run: |
          FILE_ID="1_X3PtgAelk-BGPSQXSSsXQn8B6aiKfve"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/batalla_regreso.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/batalla_regreso.mp4

      - name: Download primera_mision.mp4
        run: |
          FILE_ID="1wdwT1BUt73Ii9BRAfgwmmGfxbTdxxvyw"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/primera_mision.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/primera_mision.mp4

      - name: Download segunda_mision.mp4
        run: |
          FILE_ID="1So57nA9zj9939Wm3Ersd6EHElXIXwYqP"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/segunda_mision.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/segunda_mision.mp4

      - name: Download tercera_mision.mp4
        run: |
          FILE_ID="1ZUyvU44swFDlMHSjPkjlcWjhQDCvGcjD"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/tercera_mision.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/tercera_mision.mp4

      - name: Download cuarta_mision.mp4
        run: |
          FILE_ID="174rrFFbx6GSfKwsz1s0QbvQYtxqwKRSB"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/cuarta_mision.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/cuarta_mision.mp4

      - name: Download final_nave.mp4
        run: |
          FILE_ID="1RYm3ZfUz7OPRrPsf7q-qLfrFdClz6ma-"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/final_nave.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/final_nave.mp4

      - name: Download final_final.mp4
        run: |
          FILE_ID="1HEYd1MzZJiqbFMprAWWLuABEb4CoXiRM"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/final_final.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/final_final.mp4

      - name: Verify all videos downloaded
        run: |
          echo "=== Videos descargados ==="
          ls -lh assets/videos/
          echo "=== Total ==="
          du -sh assets/videos/

      - name: Create launcher icons
        run: |
          python3 << 'EOF'
          import struct, zlib, os

          def make_png(w, h, r, g, b):
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              rows = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
              idat = zlib.compress(rows)
              def chunk(t, d):
                  crc = zlib.crc32(t + d) & 0xffffffff
                  return struct.pack('>I', len(d)) + t + d + struct.pack('>I', crc)
              return sig + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')

          sizes = {
              'mipmap-mdpi': 48, 'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192
          }
          for folder, size in sizes.items():
              path = f'android/app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              png = make_png(size, size, 1, 8, 16)
              for name in ['ic_launcher.png', 'ic_launcher_round.png']:
                  with open(f'{path}/{name}', 'wb') as f:
                      f.write(png)
              print(f'Created {path}/ic_launcher.png ({size}x{size})')
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-core-release
          path: build/app/outputs/flutter-apk/app-release.apk
