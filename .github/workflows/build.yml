name: Build Flutter APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Download intro video from Google Drive
        run: |
          mkdir -p assets/videos
          FILE_ID="1Sk--RSGdVOnyTYxYYPpWBaaHn_YA5w5F"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/intro_dock.mp4 \
            --max-redirs 10 \
            -b /tmp/cookies.txt -c /tmp/cookies.txt
          CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/cookies.txt 2>/dev/null | head -1 | cut -d= -f2 || echo "")
          if [ -n "$CONFIRM" ]; then
            curl -L "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" \
              -o assets/videos/intro_dock.mp4
          fi
          ls -lh assets/videos/intro_dock.mp4

      - name: Create missing launcher icons
        run: |
          # Crear todos los directorios mipmap necesarios
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p android/app/src/main/res/$dir
          done

          # Generar ícono PNG simple con Python (fénix naranja sobre fondo azul oscuro)
          python3 - <<'PYEOF'
          from PIL import Image, ImageDraw
          import os

          sizes = {
            'mipmap-mdpi': 48,
            'mipmap-hdpi': 72,
            'mipmap-xhdpi': 96,
            'mipmap-xxhdpi': 144,
            'mipmap-xxxhdpi': 192,
          }

          for folder, size in sizes.items():
            img = Image.new('RGBA', (size, size), (8, 16, 40, 255))
            draw = ImageDraw.Draw(img)
            # Círculo naranja como fénix simplificado
            margin = size // 6
            draw.ellipse([margin, margin, size-margin, size-margin],
                         fill=(255, 120, 0, 255))
            # Punto central brillante
            cx, cy = size//2, size//2
            r = size // 8
            draw.ellipse([cx-r, cy-r, cx+r, cy+r], fill=(255, 220, 100, 255))
            path = f'android/app/src/main/res/{folder}/ic_launcher.png'
            img.save(path)
            print(f'Created {path} ({size}x{size})')
          PYEOF

          # Instalar PIL si no está
          pip install Pillow --quiet 2>/dev/null || true

          python3 - <<'PYEOF2'
          from PIL import Image, ImageDraw
          import os

          sizes = {
            'mipmap-mdpi': 48,
            'mipmap-hdpi': 72,
            'mipmap-xhdpi': 96,
            'mipmap-xxhdpi': 144,
            'mipmap-xxxhdpi': 192,
          }

          for folder, size in sizes.items():
            img = Image.new('RGBA', (size, size), (8, 16, 40, 255))
            draw = ImageDraw.Draw(img)
            margin = size // 6
            draw.ellipse([margin, margin, size-margin, size-margin], fill=(255, 120, 0, 255))
            cx, cy = size//2, size//2
            r = size // 8
            draw.ellipse([cx-r, cy-r, cx+r, cy+r], fill=(255, 220, 100, 255))
            path = f'android/app/src/main/res/{folder}/ic_launcher.png'
            os.makedirs(os.path.dirname(path), exist_ok=True)
            img.save(path)
            print(f'Created {path}')
          PYEOF2

          ls android/app/src/main/res/mipmap-*/ic_launcher.png

      - name: Install dependencies
        run: flutter pub get

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF2
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF2

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-core-release
          path: build/app/outputs/flutter-apk/app-release.apk
