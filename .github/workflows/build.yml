name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # ══════════════════════════════════════════════════════
      # DESCARGA DE VIDEOS DESDE GOOGLE DRIVE
      # Orden narrativo: intro → batalla_regreso → misiones → final
      # ══════════════════════════════════════════════════════
      - name: Create videos directory
        run: mkdir -p assets/videos

      - name: Download intro_dock.mp4
        run: |
          FILE_ID="1Sk--RSGdVOnyTYxYYPpWBaaHn_YA5w5F"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/intro_dock.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/intro_dock.mp4

      - name: Download batalla_regreso.mp4
        run: |
          FILE_ID="1_X3PtgAelk-BGPSQXSSsXQn8B6aiKfve"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/batalla_regreso.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/batalla_regreso.mp4

      - name: Download primera_mision.mp4
        run: |
          FILE_ID="1wdwT1BUt73Ii9BRAfgwmmGfxbTdxxvyw"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/primera_mision.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/primera_mision.mp4

      - name: Download segunda_mision.mp4
        run: |
          FILE_ID="1So57nA9zj9939Wm3Ersd6EHElXIXwYqP"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/segunda_mision.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/segunda_mision.mp4

      - name: Download tercera_mision.mp4
        run: |
          FILE_ID="1ZUyvU44swFDlMHSjPkjlcWjhQDCvGcjD"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/tercera_mision.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/tercera_mision.mp4

      - name: Download cuarta_mision.mp4
        run: |
          FILE_ID="174rrFFbx6GSfKwsz1s0QbvQYtxqwKRSB"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/cuarta_mision.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/cuarta_mision.mp4

      - name: Download final_nave.mp4
        run: |
          FILE_ID="1RYm3ZfUz7OPRrPsf7q-qLfrFdClz6ma-"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/final_nave.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/final_nave.mp4

      - name: Download final_final.mp4
        run: |
          FILE_ID="1HEYd1MzZJiqbFMprAWWLuABEb4CoXiRM"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/final_final.mp4 \
            --retry 3 --retry-delay 5
          ls -lh assets/videos/final_final.mp4

      - name: Verify all videos downloaded
        run: |
          echo "=== Videos descargados ==="
          ls -lh assets/videos/
          echo "=== Total ==="
          du -sh assets/videos/

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: phoenix-core-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7name: Build Flutter APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Download intro video from Google Drive
        run: |
          mkdir -p assets/videos
          FILE_ID="1Sk--RSGdVOnyTYxYYPpWBaaHn_YA5w5F"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" -o assets/videos/intro_dock.mp4 --max-redirs 10 -b /tmp/cookies.txt -c /tmp/cookies.txt
          CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/cookies.txt 2>/dev/null | head -1 | cut -d= -f2 || echo "")
          if [ -n "$CONFIRM" ]; then
            curl -L "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o assets/videos/intro_dock.mp4
          fi
          ls -lh assets/videos/intro_dock.mp4

      - name: Create launcher icons from Phoenix Core logo
        run: |
          pip install Pillow --break-system-packages --quiet
          LOGO_ID="1QumUReEsOTo71iTgLzqn3rywtk4rgfan"
          curl -L "https://drive.google.com/uc?export=download&id=${LOGO_ID}" -o /tmp/phoenix_logo.jpg --max-redirs 10
          ls -lh /tmp/phoenix_logo.jpg

          cat > /tmp/gen_icons.py << 'PYEOF'
          from PIL import Image
          import os

          img = Image.open('/tmp/phoenix_logo.jpg').convert('RGBA')
          w, h = img.size
          side = min(w, h)
          left = (w - side) // 2
          top = (h - side) // 2
          img = img.crop((left, top, left+side, top+side))

          sizes = {
            'mipmap-mdpi': 48,
            'mipmap-hdpi': 72,
            'mipmap-xhdpi': 96,
            'mipmap-xxhdpi': 144,
            'mipmap-xxxhdpi': 192
          }

          for folder, size in sizes.items():
              path = f'android/app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              img.resize((size, size), Image.LANCZOS).save(f'{path}/ic_launcher.png')
              print(f'OK: {folder}/ic_launcher.png ({size}px)')
          PYEOF

          python3 /tmp/gen_icons.py

      - name: Install dependencies
        run: flutter pub get

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-core-release
          path: build/app/outputs/flutter-apk/app-release.apk
