name: Build Flutter APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Download intro video from Google Drive
        run: |
          mkdir -p assets/videos
          FILE_ID="1Sk--RSGdVOnyTYxYYPpWBaaHn_YA5w5F"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/intro_dock.mp4 \
            --max-redirs 10 \
            -b /tmp/cookies.txt -c /tmp/cookies.txt
          CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/cookies.txt 2>/dev/null | head -1 | cut -d= -f2 || echo "")
          if [ -n "$CONFIRM" ]; then
            curl -L "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" \
              -o assets/videos/intro_dock.mp4
          fi
          ls -lh assets/videos/intro_dock.mp4

      - name: Create launcher icons
        run: |
          pip install Pillow --quiet
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          python3 -c "from PIL import Image, ImageDraw; import os; sizes={'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}; \
for k,v in sizes.items(): \
 img=Image.new('RGBA',(v,v),(8,16,40,255)); \
 draw=ImageDraw.Draw(img); \
 m=v//6; \
 draw.ellipse([m,m,v-m,v-m], fill=(255,120,0,255)); \
 img.save(f'android/app/src/main/res/mipmap-{k}/ic_launcher.png')"

      - name: Install dependencies
        run: flutter pub get

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-core-release
          path: build/app/outputs/flutter-apk/app-release.apk
