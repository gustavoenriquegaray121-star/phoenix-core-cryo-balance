name: Build Flutter APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Download intro video from Google Drive
        run: |
          mkdir -p assets/videos
          FILE_ID="1Sk--RSGdVOnyTYxYYPpWBaaHn_YA5w5F"
          curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" \
            -o assets/videos/intro_dock.mp4 \
            --max-redirs 10 \
            -b /tmp/cookies.txt -c /tmp/cookies.txt
          CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/cookies.txt 2>/dev/null | head -1 | cut -d= -f2 || echo "")
          if [ -n "$CONFIRM" ]; then
            curl -L "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" \
              -o assets/videos/intro_dock.mp4
          fi
          ls -lh assets/videos/intro_dock.mp4

      - name: Install dependencies
        run: flutter pub get

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF2
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF2

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-core-release
          path: build/app/outputs/flutter-apk/app-release.apk
