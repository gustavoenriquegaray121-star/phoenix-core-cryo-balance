name: phoenix_core
description: Phoenix Core - Cryo Balance Game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  google_mobile_ads: ^5.1.0

flutter:
  uses-material-design: true
  fonts:
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Bold.ttf
